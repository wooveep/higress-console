global:
  local: false # When deploying to a local cluster (e.g.: kind cluster), set this to true.
  kind: false # Deprecated. Please use "global.local" instead. Will be removed later.
  ingressClass: "aigateway"
  watchNamespace: ""

  proxy:
    # -- CAUTION: It is important to ensure that all Istio helm charts specify the same clusterDomain value
    # cluster domain. Default value is "cluster.local".
    clusterDomain: "cluster.local"

  # -- Default hub (registry) for console-related images, passed from parent chart.
  # Used for plugin image registry when pluginServer.imageRegistry is not set.
  hub: ""
  # -- Plugin image namespace for built-in plugins, passed from parent chart.
  # Used when pluginServer.imageNamespace is not set. Default is "plugins".
  pluginNamespace: ""

  # Observability (o11y) configurations
  o11y:
    enabled: false
    grafana:
      replicas: 1
      image:
        repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/grafana
        tag: 9.3.6
      port: 3000
      storage: 1Gi
      pvc:
        storageClassName: ""
      securityContext: {}
    prometheus:
      replicas: 1
      image:
        repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/prometheus
        tag: v2.40.7
      port: 9090
      storage: 1Gi
      pvc:
        storageClassName: ""
      resources:
        limits:
          cpu: 500m
          memory: 2Gi
      securityContext: {}
    loki:
      replicas: 1
      image:
        repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/loki
        tag: 2.9.4
      ports:
        http: 3100
        grpc: 9095
      storage: 1Gi
      pvc:
        enabled: true
        storageClassName: ""
      securityContext: {}

  pvc:
    rwxSupported: false

replicaCount: 1

image:
  repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/aigateway-console
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
name: "aigateway-console"

podEnvs:
  AIGATEWAY_CONSOLE_K8S_ENABLED: "true"
  AIGATEWAY_CONSOLE_PORTALDB_AUTO_MIGRATE: "true"
  HIGRESS_PORTAL_CONSUMER_PROJECTION_WRITE_ENABLED: "false"

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

dnsPolicy: ClusterFirst
restartPolicy: Always
schedulerName: default-scheduler

service:
  annotations: {}
  type: ClusterIP
  port: 8080
  loadBalancerIP: ""
  loadBalancerClass: ""
  loadBalancerSourceRanges: []
  externalTrafficPolicy: ""

ingress:
  enabled: false
  domain: console.aigateway.io
  tlsSecretName: ""
  annotations: {}
  paths:
    - path: /
      pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 512Mi

nodeSelector: {}
affinity: {}
tolerations: {}

web:
  login:
    prompt: "" # If set, a prompt message will be displayed on the login page.

swagger:
  enabled: false

admin:
  username: admin
  displayName: Admin
  password: "" # If set, the value will be used as the admin password for login.

chat:
  enabled: false
  endpoint: ""

controller:
  serviceName: aigateway-controller

certmanager:
  enabled: false
  replicas: 1
  image:
    repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress
    tag: v1.11.0

o11y:
  __placeholder__: true

pvc:
  __placeholder__: true

pluginServer:
  serviceName: aigateway-plugin-server
  # -- Custom URL pattern for the plugin server. When empty, Helm will default to the
  # current release namespace with the serviceName above.
  urlPattern: ""
  # -- Plugin image registry for built-in plugins. If set, will override the default registry in plugins.properties.
  # Example: "my-registry.example.com"
  imageRegistry: ""
  # -- Plugin image namespace for built-in plugins. If set, will override the default namespace in plugins.properties.
  # Default namespace is "plugins". Example: "my-plugins"
  imageNamespace: ""

portalDatabase:
  enabled: false
  # Default host is "<release>-aigateway-core-mysql" when empty.
  host: ""
  port: 3306
  database: aigateway_portal
  params: "parseTime=true&charset=utf8mb4&loc=Asia%2FShanghai"
  jdbcParams: "useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai"
  # Default secret is "<release>-aigateway-core-db" when empty.
  secretName: ""
  usernameKey: username
  passwordKey: password
