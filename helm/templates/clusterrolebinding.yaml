apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aigateway-console.name" . }}-{{ .Release.Namespace }}
  labels:
    {{- include "aigateway-console.labels" . | nindent 4 }}    
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aigateway-console.name" . }}-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aigateway-console.name" . }}
    namespace: {{ .Release.Namespace }}
