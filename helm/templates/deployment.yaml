{{- $o11y := merge (dict) .Values.o11y .Values.global.o11y }}
{{- $pluginImageRegistry := .Values.pluginServer.imageRegistry | default .Values.global.hub }}
{{- $pluginImageNamespace := .Values.pluginServer.imageNamespace | default .Values.global.pluginNamespace }}
{{- $portalDB := .Values.portalDatabase }}
{{- $portalDBHost := $portalDB.host | default (printf "%s-aigateway-core-mysql" .Release.Name) }}
{{- $portalDBSecretName := $portalDB.secretName | default (printf "%s-aigateway-core-db" .Release.Name) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aigateway-console.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aigateway-console.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if or .Values.global.local .Values.global.kind }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "aigateway-console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "aigateway-console.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aigateway-console.name" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AIGATEWAY_CONSOLE_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: AIGATEWAY_CONSOLE_CLUSTER_DOMAIN
              value: {{ include "aigateway-console.clusterDomain" . }}
            - name: AIGATEWAY_CONSOLE_CONTROLLER_SERVICE
              value: {{ .Values.controller.serviceName }}
            - name: AIGATEWAY_CONSOLE_PLUGIN_SERVER_SERVICE
              value: {{ .Values.pluginServer.serviceName }}
            - name: HIGRESS_CONSOLE_NS
              value: {{ .Release.Namespace }}
            - name: HIGRESS_CONSOLE_SECRET_NAME
              value: {{ include "aigateway-console.name" . }}
            - name: HIGRESS_CONSOLE_CONFIG_MAP_NAME
              value: {{ include "aigateway-console.name" . }}
            - name: HIGRESS_CONSOLE_SERVICE_HOST
              value: {{ include "aigateway-console.serviceHost" (dict "context" . "service" (include "aigateway-console.name" .)) }}
            - name: HIGRESS_CONSOLE_SERVICE_PORT
              value: {{ .Values.service.port | quote }}
            - name: HIGRESS_CONSOLE_CONTROLLER_SERVICE_NAME
              value: {{ .Values.controller.serviceName }}
            - name: HIGRESS_CONSOLE_CONTROLLER_JWT_POLICY
              value: {{ include "aigateway-console.controller.jwtPolicy" . }}
            - name: CLUSTER_DOMAIN_SUFFIX
              value: {{ include "aigateway-console.clusterDomain" . }}
            - name: AIGATEWAY_CONSOLE_PORTALDB_ENABLED
              value: {{ ternary "true" "false" $portalDB.enabled | quote }}
            {{- if $portalDB.enabled }}
            - name: AIGATEWAY_CONSOLE_PORTALDB_DRIVER
              value: "mysql"
            - name: PORTAL_MYSQL_HOST
              value: {{ $portalDBHost | quote }}
            - name: PORTAL_MYSQL_PORT
              value: {{ $portalDB.port | quote }}
            - name: PORTAL_MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $portalDBSecretName }}
                  key: {{ $portalDB.usernameKey }}
            - name: PORTAL_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $portalDBSecretName }}
                  key: {{ $portalDB.passwordKey }}
            - name: PORTAL_MYSQL_DATABASE
              value: {{ $portalDB.database | quote }}
            - name: PORTAL_MYSQL_PARAMS
              value: {{ $portalDB.params | default "parseTime=true&charset=utf8mb4&loc=UTC" | quote }}
            - name: HIGRESS_PORTAL_DB_URL
              value: "jdbc:mysql://{{ $portalDBHost }}:{{ $portalDB.port }}/{{ $portalDB.database }}?{{ $portalDB.jdbcParams }}"
            - name: HIGRESS_PORTAL_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $portalDBSecretName }}
                  key: {{ $portalDB.usernameKey }}
            - name: HIGRESS_PORTAL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $portalDBSecretName }}
                  key: {{ $portalDB.passwordKey }}
            {{- end }}
            - name: AIGATEWAY_CONSOLE_GRAFANA_ENABLED
              value: {{ ternary "true" "false" $o11y.enabled | quote }}
            {{- if $o11y.enabled }}
            - name: AIGATEWAY_CONSOLE_GRAFANA_SCHEME
              value: "http"
            - name: AIGATEWAY_CONSOLE_GRAFANA_SERVICE
              value: {{ include "aigateway-console-grafana.name" . }}
            - name: AIGATEWAY_CONSOLE_GRAFANA_PORT
              value: {{ $o11y.grafana.port | quote }}
            - name: AIGATEWAY_CONSOLE_GRAFANA_PATH
              value: {{ include "aigateway-console-grafana.path" . | quote }}
            - name: AIGATEWAY_CONSOLE_PROMETHEUS_SCHEME
              value: "http"
            - name: AIGATEWAY_CONSOLE_PROMETHEUS_SERVICE
              value: {{ include "aigateway-console-prometheus.name" . }}
            - name: AIGATEWAY_CONSOLE_PROMETHEUS_PORT
              value: {{ $o11y.prometheus.port | quote }}
            - name: AIGATEWAY_CONSOLE_PROMETHEUS_PATH
              value: {{ include "aigateway-console-prometheus.path" . | quote }}
            - name: AIGATEWAY_CONSOLE_LOKI_SCHEME
              value: "http"
            - name: AIGATEWAY_CONSOLE_LOKI_SERVICE
              value: {{ include "aigateway-console-loki.name" . }}
            - name: AIGATEWAY_CONSOLE_LOKI_PORT
              value: {{ $o11y.loki.ports.http | quote }}
            - name: HIGRESS_CONSOLE_DASHBOARD_BASE_URL
              value: http://{{ include "aigateway-console.serviceHost" (dict "context" . "service" (include "aigateway-console-grafana.name" .)) }}:{{ $o11y.grafana.port }}{{ include "aigateway-console-grafana.path" . }}
            - name: HIGRESS_CONSOLE_DASHBOARD_DATASOURCE_PROM_URL
              value: http://{{ include "aigateway-console.serviceHost" (dict "context" . "service" (include "aigateway-console-prometheus.name" .)) }}:{{ $o11y.prometheus.port }}{{ include "aigateway-console-prometheus.path" . }}
            - name: HIGRESS_CONSOLE_DASHBOARD_DATASOURCE_LOKI_URL
              value: http://{{ include "aigateway-console.serviceHost" (dict "context" . "service" (include "aigateway-console-loki.name" .)) }}:{{ $o11y.loki.ports.http }}
            {{- end }}
            {{- if .Values.global.ingressClass }}
            - name: HIGRESS_CONSOLE_CONTROLLER_INGRESS_CLASS_NAME
              value: {{ .Values.global.ingressClass }}
            {{- end }}
            {{- if .Values.global.watchNamespace }}
            - name: HIGRESS_CONSOLE_CONTROLLER_WATCHED_NAMESPACE
              value: {{ .Values.global.watchNamespace }}
            {{- end }}
            - name: SPRINGDOC_API_DOCS_ENABLED
              value: "{{ .Values.swagger.enabled }}"
            - name: SPRINGDOC_SWAGGER_UI_ENABLED
              value: "{{ .Values.swagger.enabled }}"
            {{- if and .Values.global.enablePluginServer (not (hasKey .Values.podEnvs "HIGRESS_ADMIN_WASM_PLUGIN_CUSTOM_IMAGE_URL_PATTERN"))}}
            - name: HIGRESS_ADMIN_WASM_PLUGIN_CUSTOM_IMAGE_URL_PATTERN
              value: "{{ include "aigateway-console.pluginServer.urlPattern" . }}"
            {{- end }}
            {{- if and .Values.pluginServer.imageRegistry (not (hasKey .Values.podEnvs "HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_REGISTRY")) }}
            - name: HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_REGISTRY
              value: "{{ .Values.pluginServer.imageRegistry }}"
            {{- else if and $pluginImageRegistry (not (hasKey .Values.podEnvs "HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_REGISTRY")) }}
            - name: HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_REGISTRY
              value: "{{ $pluginImageRegistry }}"
            {{- end }}
            {{- if and .Values.pluginServer.imageNamespace (not (hasKey .Values.podEnvs "HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_NAMESPACE")) }}
            - name: HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_NAMESPACE
              value: "{{ .Values.pluginServer.imageNamespace }}"
            {{- else if and $pluginImageNamespace (not (hasKey .Values.podEnvs "HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_NAMESPACE")) }}
            - name: HIGRESS_ADMIN_WASM_PLUGIN_IMAGE_NAMESPACE
              value: "{{ $pluginImageNamespace }}"
            {{- end }}
            {{- if .Values.podEnvs }}
            {{- range $key, $val := .Values.podEnvs }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
          {{- if eq (include "aigateway-console.controller.jwtPolicy" .) "third-party-jwt" }}
            - mountPath: /var/run/secrets/access-token
              name: access-token
          {{- end }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      restartPolicy: {{ .Values.restartPolicy }}
      schedulerName: {{ .Values.schedulerName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      {{- if eq (include "aigateway-console.controller.jwtPolicy" .) "third-party-jwt" }}
        - name: access-token
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                audience: istio-ca
                expirationSeconds: 3600
                path: token
      {{- end }}
