apiVersion: 1.0.0
info:
  gatewayMinVersion: ""
  type: oss
  category: ai
  image: platform_wasm/ai-quota
  name: ai-quota
  title: AI Quota
  x-title-i18n:
    zh-CN: AI 配额管理
  description: Implement quota-based management in both token and amount modes, including quota queries, refresh, delta updates, and durable billing event emission in amount mode. Natural day/week/month windows in amount mode use UTC.
  x-description-i18n:
    zh-CN: 支持 token 与 amount 两种配额模式，既可以进行 quota 管理，也可以在 amount 模式下发出细分账务事件并落库；amount 模式的自然日/周/月窗口统一按 UTC 计算。
  iconUrl: https://img.alicdn.com/imgextra/i1/O1CN018iKKih1iVx287RltL_!!6000000004419-2-tps-42-42.png
  version: 1.1.0
  contact:
    name: 2456868764
spec:
  phase: default
  priority: 750
  configSchema:
    openAPIV3Schema:
      type: object
      properties:
        quota_unit:
          type: string
          title: 配额模式
          x-title-i18n:
            en-US: Quota Mode
          description: 配额模式，支持 token 或 amount
          x-description-i18n:
            en-US: Quota mode, either token or amount
          enum:
            - token
            - amount
          default: "amount"
        redis_key_prefix:
          type: string
          title: Quota Redis Key前缀
          x-title-i18n:
            en-US: Quota Redis Key Prefix
          description: token 模式下的 quota redis key 前缀
          x-description-i18n:
            en-US: Quota redis key prefix in token mode
          default: "chat_quota:"
        balance_key_prefix:
          type: string
          title: 余额 Redis Key前缀
          x-title-i18n:
            en-US: Balance Redis Key Prefix
          description: amount 模式下的余额 redis key 前缀
          x-description-i18n:
            en-US: Balance redis key prefix in amount mode
          default: "billing:balance:"
        price_key_prefix:
          type: string
          title: 模型价格 Redis Key前缀
          x-title-i18n:
            en-US: Model Price Redis Key Prefix
          description: amount 模式下的模型价格 redis key 前缀，对应 Portal 物化后的完整 ModelPriceData 价格快照
          x-description-i18n:
            en-US: Redis key prefix for the materialized ModelPriceData pricing hash used in amount mode
          default: "billing:model-price:"
        usage_event_stream:
          type: string
          title: 消费事件 Stream
          x-title-i18n:
            en-US: Usage Event Stream
          description: amount 模式下写入细分 token、图像和 request_count 账务事件的 Redis Stream 名称
          x-description-i18n:
            en-US: Redis stream used to emit detailed billing usage events in amount mode
          default: "billing:usage:stream"
        usage_event_dedup_prefix:
          type: string
          title: 消费事件去重 Key前缀
          x-title-i18n:
            en-US: Usage Event Dedup Prefix
          description: amount 模式下消费事件去重 key 前缀
          x-description-i18n:
            en-US: Usage event dedup key prefix in amount mode
          default: "billing:usage:event:"
        admin_consumer:
          type: string
          title: 管理身份Consumer
          x-title-i18n:
            en-US: Admin Consumer
          description: 管理 quota 管理身份的 consumer 名称
          x-description-i18n:
            en-US: Consumer name for managing quota management identity
        admin_path:
          type: string
          title: 管理请求路径
          x-title-i18n:
            en-US: Admin Request Path
          description: 管理 quota 请求 path 前缀
          x-description-i18n:
            en-US: Prefix for the path to manage quota requests
          default: "/quota"
        redis:
          type: object
          title: Redis配置
          x-title-i18n:
            en-US: Redis Configuration
          description: redis相关配置
          x-description-i18n:
            en-US: Redis related configuration
          required: [service_name]
          properties:
            service_name:
              type: string
              title: Redis服务名称
              x-title-i18n:
                en-US: Redis Service Name
              description: redis 服务名称，带服务类型的完整 FQDN 名称，例如 my-redis.dns、redis.my-ns.svc.cluster.local
              x-description-i18n:
                en-US: Redis service name, full FQDN name with service type, e.g., my-redis.dns, redis.my-ns.svc.cluster.local
            service_port:
              type: integer
              title: Redis服务端口
              x-title-i18n:
                en-US: Redis Service Port
              description: 输入redis服务的服务端口
              x-description-i18n:
                en-US: Service port for the redis service
              default: 6379
            username:
              type: string
              title: Redis用户名
              x-title-i18n:
                en-US: Redis Username
              description: redis用户名
              x-description-i18n:
                en-US: Redis username
            password:
              type: string
              title: Redis密码
              x-title-i18n:
                en-US: Redis Password
              description: redis密码
              x-description-i18n:
                en-US: Redis password
            timeout:
              type: integer
              title: Redis连接超时
              x-title-i18n:
                en-US: Redis Connection Timeout
              description: redis连接超时时间，单位毫秒
              x-description-i18n:
                en-US: Redis connection timeout in milliseconds
              default: 1000
      required: [admin_consumer, redis]
      example:
        quota_unit: amount
        balance_key_prefix: "billing:balance:"
        price_key_prefix: "billing:model-price:"
        usage_event_stream: "billing:usage:stream"
        usage_event_dedup_prefix: "billing:usage:event:"
        admin_consumer: consumer3
        admin_path: /quota
        redis:
          service_name: redis-service.default.svc.cluster.local
          service_port: 6379
          timeout: 2000
