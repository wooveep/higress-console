apiVersion: 1.0.0
info:
  gatewayMinVersion: ""
  type: enterprise
  category: ai
  name: ai-statistics
  image: platform_wasm/ai-statistics
  title: AI Statistics
  x-title-i18n:
    zh-CN: AI 统计
  description: Provides AI usage observability, including token statistics, detailed cache and image metrics, logs, and tracing.
  x-description-i18n:
    zh-CN: 提供 AI 用量可观测能力，包括 token 统计、缓存与图像细分指标、日志和链路追踪。
  iconUrl: https://img.alicdn.com/imgextra/i1/O1CN018iKKih1iVx287RltL_!!6000000004419-2-tps-42-42.png
  version: 2.0.0
  contact:
    name: rinfx
spec:
  phase: STATS
  priority: 900
  configSchema:
    openAPIV3Schema:
      type: object
      properties:
        disable_openai_usage:
          type: boolean
          title: 禁用 OpenAI Usage 自动提取
          x-title-i18n:
            en-US: Disable OpenAI Usage Auto Extraction
          description: 非 OpenAI 兼容协议时可关闭默认 usage 提取，避免误判
          x-description-i18n:
            en-US: Disable default usage extraction for non-OpenAI-compatible protocols
          default: false
        value_length_limit:
          type: integer
          title: 单值长度限制
          x-title-i18n:
            en-US: Value Length Limit
          description: 单个日志或 span 字段的长度限制
          x-description-i18n:
            en-US: Maximum length for each extracted log or span field
          default: 32000
        enable_path_suffixes:
          type: array
          title: 生效路径后缀
          x-title-i18n:
            en-US: Enabled Path Suffixes
          description: 仅对这些路径后缀生效，可配置 * 匹配全部路径
          x-description-i18n:
            en-US: Only process requests with these path suffixes, or use * to match all paths
          items:
            type: string
        enable_content_types:
          type: array
          title: 生效内容类型
          x-title-i18n:
            en-US: Enabled Content Types
          description: 仅缓冲这些内容类型的响应体
          x-description-i18n:
            en-US: Only buffer response bodies for these content types
          items:
            type: string
        session_id_header:
          type: string
          title: Session ID Header
          x-title-i18n:
            en-US: Session ID Header
          description: 指定读取 session ID 的请求头名称
          x-description-i18n:
            en-US: Custom request header name used to read the session ID
        attributes:
          type: array
          title: 可观测属性
          x-title-i18n:
            en-US: Observable Attributes
          description: 用户希望记录在 log/span 中的信息
          x-description-i18n:
            en-US: Information that the user wants to record in log/span
          items:
            type: object
            required:
              - key
            properties:
              key:
                type: string
                title: 属性名称
                x-title-i18n:
                  en-US: Attribute Key
              value_source:
                type: string
                title: 取值来源
                x-title-i18n:
                  en-US: Value Source
                enum:
                  - fixed_value
                  - request_header
                  - request_body
                  - response_header
                  - response_body
                  - response_streaming_body
              value:
                type: string
                title: 取值路径
                x-title-i18n:
                  en-US: Value Path
              default_value:
                type: string
                title: 默认值
                x-title-i18n:
                  en-US: Default Value
              rule:
                type: string
                title: 提取规则
                x-title-i18n:
                  en-US: Extract Rule
                enum:
                  - first
                  - replace
                  - append
              apply_to_log:
                type: boolean
                title: 记录到日志
                x-title-i18n:
                  en-US: Apply to Log
                default: false
              apply_to_span:
                type: boolean
                title: 记录到追踪
                x-title-i18n:
                  en-US: Apply to Span
                default: false
              trace_span_key:
                type: string
                title: Span 属性名
                x-title-i18n:
                  en-US: Span Attribute Key
              as_separate_log_field:
                type: boolean
                title: 独立日志字段
                x-title-i18n:
                  en-US: Separate Log Field
                default: false
      example:
        disable_openai_usage: false
        value_length_limit: 32000
        attributes:
          - key: consumer
            value_source: request_header
            value: x-mse-consumer
            apply_to_log: true
          - key: reasoning_tokens
            apply_to_log: true
          - key: cached_tokens
            apply_to_log: true
  routeConfigSchema:
    openAPIV3Schema:
      type: object
      properties:
        disable_openai_usage:
          type: boolean
          title: 禁用 OpenAI Usage 自动提取
          x-title-i18n:
            en-US: Disable OpenAI Usage Auto Extraction
          description: 非 OpenAI 兼容协议时可关闭默认 usage 提取，避免误判
          x-description-i18n:
            en-US: Disable default usage extraction for non-OpenAI-compatible protocols
          default: false
        value_length_limit:
          type: integer
          title: 单值长度限制
          x-title-i18n:
            en-US: Value Length Limit
          description: 单个日志或 span 字段的长度限制
          x-description-i18n:
            en-US: Maximum length for each extracted log or span field
          default: 32000
        enable_path_suffixes:
          type: array
          title: 生效路径后缀
          x-title-i18n:
            en-US: Enabled Path Suffixes
          items:
            type: string
        enable_content_types:
          type: array
          title: 生效内容类型
          x-title-i18n:
            en-US: Enabled Content Types
          items:
            type: string
        session_id_header:
          type: string
          title: Session ID Header
          x-title-i18n:
            en-US: Session ID Header
        attributes:
          type: array
          title: 可观测属性
          x-title-i18n:
            en-US: Observable Attributes
          items:
            type: object
            required:
              - key
            properties:
              key:
                type: string
              value_source:
                type: string
                enum:
                  - fixed_value
                  - request_header
                  - request_body
                  - response_header
                  - response_body
                  - response_streaming_body
              value:
                type: string
              default_value:
                type: string
              rule:
                type: string
                enum:
                  - first
                  - replace
                  - append
              apply_to_log:
                type: boolean
                default: false
              apply_to_span:
                type: boolean
                default: false
              trace_span_key:
                type: string
              as_separate_log_field:
                type: boolean
                default: false
      example:
        value_length_limit: 32000
        attributes:
          - key: answer
            value_source: response_streaming_body
            value: choices.0.delta.content
            rule: append
            apply_to_log: true
