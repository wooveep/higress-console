springdoc.api-docs.enabled=false
springdoc.pathsToMatch=/v1/**,/session/**,/dashboard/**,/system/**,/user/**
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

higress-console.build.version=@app.build.version@
higress-console.build.dev=@app.build.dev@

server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=2048
server.compression.excluded-user-agents=MSIE 6.0,UCBrowser
spring.jackson.serialization.write-dates-as-timestamps=false

# Add %mdc (Mapped Diagnostic Context) based on the Spring Boot default logging pattern found in org.springframework.boot.logging.logback.DefaultLogbackConfiguration
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(70396){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} {%mdc} %clr(:){faint} %m%n%wEx

higress.portal.db.url=${HIGRESS_PORTAL_DB_URL:}
higress.portal.db.username=${HIGRESS_PORTAL_DB_USERNAME:}
higress.portal.db.password=${HIGRESS_PORTAL_DB_PASSWORD:}
higress.portal.consumer.projection.write-enabled=${HIGRESS_PORTAL_CONSUMER_PROJECTION_WRITE_ENABLED:false}
higress.portal.level-auth.reconcile.enabled=${HIGRESS_PORTAL_LEVEL_AUTH_RECONCILE_ENABLED:true}
higress.portal.level-auth.reconcile.initial-delay-millis=${HIGRESS_PORTAL_LEVEL_AUTH_RECONCILE_INITIAL_DELAY_MILLIS:10000}
higress.portal.level-auth.reconcile.interval-millis=${HIGRESS_PORTAL_LEVEL_AUTH_RECONCILE_INTERVAL_MILLIS:5000}
higress.portal.ai-sensitive.projection.write-enabled=${HIGRESS_PORTAL_AI_SENSITIVE_PROJECTION_WRITE_ENABLED:true}
higress.portal.ai-sensitive.sync.initial-delay-millis=${HIGRESS_PORTAL_AI_SENSITIVE_SYNC_INITIAL_DELAY_MILLIS:10000}
higress.portal.ai-sensitive.sync.interval-millis=${HIGRESS_PORTAL_AI_SENSITIVE_SYNC_INTERVAL_MILLIS:30000}
higress.portal.ai-sensitive.audit.service-name=${HIGRESS_PORTAL_AI_SENSITIVE_AUDIT_SERVICE_NAME:${HIGRESS_CONSOLE_CONFIG_MAP_NAME:aigateway-console}}
higress.portal.ai-sensitive.audit.namespace=${HIGRESS_PORTAL_AI_SENSITIVE_AUDIT_NAMESPACE:${HIGRESS_CONSOLE_NS:default}}
higress.portal.ai-sensitive.audit.port=${HIGRESS_PORTAL_AI_SENSITIVE_AUDIT_PORT:${HIGRESS_CONSOLE_SERVICE_PORT:8080}}
higress.portal.ai-sensitive.audit.path=${HIGRESS_PORTAL_AI_SENSITIVE_AUDIT_PATH:/v1/internal/ai/sensitive-block-events}
higress.portal.ai-sensitive.audit.timeout-ms=${HIGRESS_PORTAL_AI_SENSITIVE_AUDIT_TIMEOUT_MS:2000}
higress.portal.org.default-password=${HIGRESS_PORTAL_ORG_DEFAULT_PASSWORD:}
